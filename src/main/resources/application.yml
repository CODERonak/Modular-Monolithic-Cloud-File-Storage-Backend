server:
  port: 8080

spring:
  application:
    name: Cloud-File-Storage

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    user:
      name: boot
      password: spring

  # Google cloud storage and cloud SQL config
  cloud:
    gcp:
      sql:
        enabled: true
        database-name: ${DB_NAME}
        instance-connection-name: ${INSTANCE_CONNECTION_NAME}
      project-id: ${GCP_PROJECT_ID}
      credentials:
        location: classpath:gcp/gcp-key.json
      storage:
        bucket: ${GCP_STORAGE_BUCKET_NAME}

# Default Admin User Configuration
# These credentials are used to create the initial admin account on startup.
admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASS}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
